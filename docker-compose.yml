services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: financial_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  pinecone-local:
    image: ghcr.io/pinecone-io/pinecone-local:latest
    ports:
      - "5080-5090:5080-5090"
volumes:
  postgres_data: